name: Dev Export

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Export target (linux|windows|mac)"
        required: true
        default: linux
        type: choice
        options:
          - linux
          - windows
          - mac

jobs:
  linux:
    if: ${{ github.event.inputs.target == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Clean previous output
        run: npm run clean

      - name: Build LiveRouteOCR helper
        shell: pwsh
        run: ./scripts/build-live-helper.ps1

      - name: Build renderer
        run: npm run build

      - name: Package application
        run: npx electron-builder --publish never --linux AppImage --config.directories.output=release/dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-export
          path: release/dev/
          if-no-files-found: error

  windows:
    if: ${{ github.event.inputs.target == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install dependencies
        run: npm ci

      - name: Clean previous output
        run: npm run clean

      - name: Build LiveRouteOCR helper
        shell: pwsh
        run: ./scripts/build-live-helper.ps1

      - name: Build renderer
        run: npm run build

      - name: Package application
        run: npx electron-builder --publish never --win nsis --config.directories.output=release/dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-export
          path: release/dev/
          if-no-files-found: error

  mac:
    if: ${{ github.event.inputs.target == 'mac' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Install dependencies
        run: npm ci

      - name: Clean previous output
        run: npm run clean

      - name: Build LiveRouteOCR helper
        shell: pwsh
        run: ./scripts/build-live-helper.ps1

      - name: Build renderer
        run: npm run build

      - name: Package application
        run: npx electron-builder --publish never --mac dmg --config.directories.output=release/dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-export
          path: release/dev/
          if-no-files-found: error
