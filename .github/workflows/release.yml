name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build app
        shell: pwsh
        run: npm run dist

      - name: List release contents
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName,Length,LastWriteTime

      - name: Publish GitHub release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            release/latest.yml
            release/3s-PokeChamp-Tool-*-win-x64.exe
            release/3s-PokeChamp-Tool-*-win-x64.exe.blockmap
            release/3s-PokeChamp-Tool-*-win-x64.zip
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install AppImage dependency
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run pack:linux

      - name: List release contents
        run: find release -type f -print -exec ls -l {} \;

      - name: Publish GitHub release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            release/latest-linux.yml
            release/3s-PokeChamp-Tool-*-linux-x64.AppImage
            release/3s-PokeChamp-Tool-*-linux-x64.AppImage.blockmap
            release/3s-PokeChamp-Tool-*-linux-x64.tar.gz
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run pack:mac

      - name: List release contents
        run: find release -type f -print -exec ls -l {} \;

      - name: Publish GitHub release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            release/latest-mac.yml
            release/3s-PokeChamp-Tool-*-mac-x64.dmg
            release/3s-PokeChamp-Tool-*-mac-x64.zip
            release/3s-PokeChamp-Tool-*-mac-x64.zip.blockmap
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
