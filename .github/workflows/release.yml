name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build app
        shell: pwsh
        run: npm run dist

      - name: List release contents
        shell: pwsh
        run: Get-ChildItem -Path release -Recurse | Select-Object FullName,Length,LastWriteTime

      - name: Publish GitHub release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            release/latest.yml
            release/3s-PokeChamp-Tool-*-win-x64.exe
            release/3s-PokeChamp-Tool-*-win-x64.exe.blockmap
            release/3s-PokeChamp-Tool-*-win-x64.zip
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
